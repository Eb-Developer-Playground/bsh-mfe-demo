server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # CORS — allow cross-origin requests (CDN fonts/images for MFE shells)
    add_header Access-Control-Allow-Origin "*" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA routing — fall all non-file routes to index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Don't cache index.html (it loads the JS with hashed filenames)
        location = /index.html {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }
    }

    # Long-lived cache for hashed assets (Angular generates content hashes)
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|eot|ttf|webp)$ {
        add_header Access-Control-Allow-Origin "*" always;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Federation manifest and env config — no cache (refetched at runtime)
    location /env.config.json {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    location /federation.manifest.json {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to Node artifacts
    location ~ (node_modules|package\.json)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
