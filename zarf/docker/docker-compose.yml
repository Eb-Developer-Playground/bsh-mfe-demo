# =============================================================================
# Local development with Docker
#
# Spins up all four MFE apps + CDN as Docker containers.
# Federation manifests are mounted per-app so sibling URLs point to the
# correct published localhost ports (e.g. http://localhost:4201/remoteEntry.json).
#
# Usage:
#   docker compose up --build
#   open http://localhost:4200
# =============================================================================

services:
  # ── Static assets (fonts, images) ──────────────────────────────────────────
  cdn:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ../../public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - mfe-net

  # ── Host (shell) ───────────────────────────────────────────────────────────
  host:
    build:
      context: ../..
      dockerfile: zarf/docker/Dockerfile.host
      args:
        BASE_HREF: /
    ports:
      - "4200:80"
    environment:
      ENV_PRODUCTION: "false"
      ENV_API_URL: "http://localhost:8080"
      ENV_SCOPE: "http://localhost:4200"
      ENV_CDN_URL: "http://localhost:3000"
    volumes:
      - ./manifests/host.federation.manifest.json:/usr/share/nginx/html/federation.manifest.json:ro
    networks:
      - mfe-net
    depends_on:
      - cdn
      - explore
      - decide
      - checkout

  # ── Explore (catalog) ──────────────────────────────────────────────────────
  explore:
    build:
      context: ../..
      dockerfile: zarf/docker/Dockerfile.explore
      args:
        BASE_HREF: /
    ports:
      - "4201:80"
    environment:
      ENV_PRODUCTION: "false"
      ENV_API_URL: "http://localhost:8080"
      ENV_SCOPE: "http://localhost:4201"
      ENV_CDN_URL: "http://localhost:3000"
    volumes:
      - ./manifests/explore.federation.manifest.json:/usr/share/nginx/html/federation.manifest.json:ro
    networks:
      - mfe-net
    depends_on:
      - cdn

  # ── Decide (product detail) ────────────────────────────────────────────────
  decide:
    build:
      context: ../..
      dockerfile: zarf/docker/Dockerfile.decide
      args:
        BASE_HREF: /
    ports:
      - "4202:80"
    environment:
      ENV_PRODUCTION: "false"
      ENV_API_URL: "http://localhost:8080"
      ENV_SCOPE: "http://localhost:4202"
      ENV_CDN_URL: "http://localhost:3000"
    volumes:
      - ./manifests/decide.federation.manifest.json:/usr/share/nginx/html/federation.manifest.json:ro
    networks:
      - mfe-net
    depends_on:
      - cdn

  # ── Checkout (cart) ────────────────────────────────────────────────────────
  checkout:
    build:
      context: ../..
      dockerfile: zarf/docker/Dockerfile.checkout
      args:
        BASE_HREF: /
    ports:
      - "4203:80"
    environment:
      ENV_PRODUCTION: "false"
      ENV_API_URL: "http://localhost:8080"
      ENV_SCOPE: "http://localhost:4203"
      ENV_CDN_URL: "http://localhost:3000"
    volumes:
      - ./manifests/checkout.federation.manifest.json:/usr/share/nginx/html/federation.manifest.json:ro
    networks:
      - mfe-net
    depends_on:
      - cdn

networks:
  mfe-net:
    driver: bridge
